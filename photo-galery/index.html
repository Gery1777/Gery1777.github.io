<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Photo Galery</title>
</head>

<body>
    <div class="big-container">
        <div class="photo-container">
            <img class="arrow" id="back" src="images/back.png">
            <img class="audio" id="play" src="images/playbutton.png">
            <img id="photo">
            <div class="description">
                <h1 id="photo-title"></h1>
                <p id="photo-description"></p>
            </div>
            <img class="arrow" id="forward" src="images/forward.png">
        </div>
    </div>
    <div class="small-container">
    </div>
    <!-- end of content -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="module" src="scripts.js"></script>
</body>

</html>
