<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To Do List</title>
</head>

<body>
    <div class="container">
        <h1>To Do List</h1>
        <div class="new-item">
            <input ID="txtAddListItem" type="text" placeholder="Add items to your list">
            <button ID="btnAddListItem" class="purplebutton">Add</button>
        </div>
        <ul class="list">
        </ul>
        <div class="footer">
            <i>You have 0 items on your list.</i> <button ID="btnClearAll" OnClick=clearall();> Clear All</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="scripts.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
</body>

</html>
